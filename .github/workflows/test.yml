name: Test

on:
  push:
    paths:
      - ".github/workflows/test.yml"
      - ".github/typst-packages.typ"
      - "template/**"
      - "lib/**"
      - "fonts/**"
      - "template.typ"
      - "typst.toml"
  pull_request:
    paths:
      - ".github/workflows/test.yml"
      - ".github/typst-packages.typ"
      - "template/**"
      - "lib/**"
      - "fonts/**"
      - "template.typ"
      - "typst.toml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_NAME: modern-npu-thesis
  PACKAGE_VERSION: 0.1.0

jobs:
  render:
    name: Compile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.14.0
          cache-dependency-path: .github/typst-packages.typ

      - name: Create output directory
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Compile repository example
        run: |
          typst compile --root . --font-path fonts template/graduate.typ dist/thesis.pdf
          typst compile --root . --font-path fonts template/bachelor.typ dist/bachelor.pdf

      - name: Install package locally for template smoke test
        run: |
          $packageRoot = Join-Path (Get-Location) ".typst/packages"
          $packageDir = Join-Path $packageRoot "preview/$env:PACKAGE_NAME/$env:PACKAGE_VERSION"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          Get-ChildItem -Force | Where-Object {
            $_.Name -notin @(".git", ".github", ".typst", ".vscode", "dist")
          } | Copy-Item -Destination $packageDir -Recurse -Force

      - name: Compile package template entrypoint
        run: |
          typst compile --root . --package-cache-path .typst/packages --font-path fonts template/graduate.typ dist/thesis-template.pdf
          typst compile --root . --package-cache-path .typst/packages --font-path fonts template/bachelor.typ dist/bachelor-template.pdf

      - name: Upload PDF artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: thesis-pdf
          path: |
            dist/thesis.pdf
            dist/thesis-template.pdf
            dist/bachelor.pdf
            dist/bachelor-template.pdf
