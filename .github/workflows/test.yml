name: Test

on:
  push:
    paths:
      - ".github/workflows/test.yml"
      - "template/**"
      - "lib/**"
      - "fonts/**"
      - "template.typ"
      - "typst.toml"
  pull_request:
    paths:
      - ".github/workflows/test.yml"
      - "template/**"
      - "lib/**"
      - "fonts/**"
      - "template.typ"
      - "typst.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    name: Compile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.14.0

      - name: Create output directory
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Compile repository example
        run: |
          typst compile --root . --font-path fonts template/graduate.typ dist/graduate.pdf
          typst compile --root . --font-path fonts template/bachelor.typ dist/bachelor.pdf

      - name: Upload PDF artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: thesis-pdf
          path: |
            dist/graduate.pdf
            dist/bachelor.pdf
